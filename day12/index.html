<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Main Grid Layout */
.container {
  display: grid;
  grid-template-areas:
    "header header header"
    "sidebar main right"
    "footer footer footer";
  grid-template-columns: 200px 1fr 200px;
  grid-template-rows: 80px 1fr 60px;
  height: 100vh;
  gap: 10px;
  padding: 10px;
}

/* Box Styling */
.box {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-radius: 10px;
  color: white;
}

/* Sections */
.header {
  grid-area: header;
  background: #ff6b6b;
}

.sidebar {
  grid-area: sidebar;
  background: #4dabf7;
}

.main {
  grid-area: main;
  background: #51cf66;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.right {
  grid-area: right;
  background: #845ef7;
}

.footer {
  grid-area: footer;
  background: #343a40;
}

/* Inner Grid Boxes */
.card {
  background: #20c997;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
}

</style>
</head>

<body>

<div class="container">

  <div class="box header">HEADER</div>

  <div class="box sidebar">SIDEBAR</div>

  <div class="main">
    <div class="card">BOX 1</div>
    <div class="card">BOX 2</div>
    <div class="card">BOX 3</div>
    <div class="card">BOX 4</div>
    <div class="card">BOX 5</div>
    <div class="card">BOX 6</div>
  </div>

  <div class="box right">RIGHT PANEL</div>

  <div class="box footer">FOOTER</div>

</div>

</body>
</html>
