<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sijan | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <nav class="navbar">
            <div class="logo">SIJAN</div>
            <div class="gallery-link">gallery</div>
        </nav>

        <main class="main-content">
            <section class="profile-section">
                <img src="images/profile.png" alt="Profile" class="avatar">
                <h1>Hi. I'm <span>SIJAN</span>.</h1>
                <p class="location">Developer from Pokhara, Nepal.</p>
                <p class="bio">Turning coffee ☕ into code. Building ideas into reality, one commit at a time.</p>
                <img src="images/hero.png" alt="Sijan" class="main-img">
            </section>

            <section class="gallery-socials-section">
                <div class="gallery-card">
                    <p class="label">GALLERY</p>
                    <div class="card-header">
                        <h2>Selected frames</h2>
                        <a href="#">View all</a>
                    </div>
                    <div class="image-grid">
                        <img src="images/galery/1.png" alt="photo">
                        <img src="images/galery/2.png" alt="photo">
                        <img src="images/galery/3.png" alt="photo">
                        <img src="images/galery/4.png" alt="photo">
                    </div>
                </div>

                <div class="socials-list">
                    <p class="label">Socials</p>
                    <a href="mailto:thapasijan171@gmail.com">
                        <div class="social-item">Email: thapasijan171@gmail.com</div>
                    </a>
                    <a href="https://github.com/sijanthapa171" target="_blank">
                        <div class="social-item">GitHub: sijanthapa171</div>
                    </a>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
